<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four | Gentleman's Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vintage-overlay"></div>
    <div class="container">
        <header class="game-header">
            <h1 class="game-title">CONNECT FOUR</h1>
            <div class="subtitle">A Gentleman's Pursuit</div>
        </header>

        <div class="game-display">
            <div class="wooden-frame">
                <div class="brass-plate">
                    <div class="game-info">
                        <div class="player-turn">
                            <div class="turn-indicator">
                                <span class="turn-label">CURRENT PLAYER</span>
                                <div class="player-token" id="current-player-token">
                                    <div class="token gentleman"></div>
                                </div>
                                <span class="player-name" id="current-player-name">THE GENTLEMAN</span>
                            </div>
                        </div>
                        <div class="game-status">
                            <div class="status-message" id="game-status">YOUR MOVE, CHAMP</div>
                        </div>
                    </div>
                </div>

                <div class="game-board-container">
                    <div class="board-stand-top"></div>
                    <div class="game-board-wrapper">
                        <div class="column-headers">
                            <div class="column-header" data-column="0">1</div>
                            <div class="column-header" data-column="1">2</div>
                            <div class="column-header" data-column="2">3</div>
                            <div class="column-header" data-column="3">4</div>
                            <div class="column-header" data-column="4">5</div>
                            <div class="column-header" data-column="5">6</div>
                            <div class="column-header" data-column="6">7</div>
                        </div>
                        
                        <div class="game-board" id="game-board">
                            <!-- Board will be generated by JavaScript -->
                        </div>
                    </div>
                    <div class="board-stand-bottom"></div>
                </div>
            </div>
        </div>

        <div class="strategy-panel">
            <div class="strategy-selector">
                <label for="ai-strategy">OPPONENT'S CALIBER:</label>
                <select id="ai-strategy" class="strategy-select">
                    <option value="novice">NOVICE</option>
                    <option value="balanced" selected>BALANCED</option>
                    <option value="strategist">STRATEGIST</option>
                    <option value="master">MASTER</option>
                </select>
            </div>
        </div>

        <div class="controls-panel">
            <div class="control-buttons">
                <button class="control-btn reset-btn" id="reset-btn">
                    <span class="btn-icon">↻</span>
                    NEW CHALLENGE
                </button>
                <button class="control-btn computer-btn" id="computer-btn">
                    <span class="btn-icon">♟</span>
                    OPPONENT'S MOVE
                </button>
            </div>
        </div>

        <footer class="game-footer">
            <div class="rules">
                <h3>THE ART OF STRATEGY</h3>
                <p>Connect four of your pieces vertically, horizontally, or diagonally. You are <strong>THE GENTLEMAN</strong> - show your prowess against worthy opponents of varying caliber.</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
